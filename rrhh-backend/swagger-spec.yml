openapi: 3.0.3

info:
  title: RRHH Backend API
  description: >
    API REST para la gestión de Recursos Humanos. Permite administrar
    departamentos, empleados y registros de asistencia.
  version: 1.0.0
  contact:
    name: RRHH Backend

servers:
  - url: http://localhost:3000/api
    description: Servidor de desarrollo local

tags:
  - name: Health
    description: Estado del servidor
  - name: Departments
    description: Gestión de departamentos
  - name: Employees
    description: Gestión de empleados
  - name: Attendance
    description: Registros de asistencia

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ── Health ────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Verificar estado del servidor
      operationId: getHealth
      responses:
        "200":
          description: El servidor está activo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                ok: true
                message: Backend RRHH activo

  # ── Departments ───────────────────────────────────────────────────────────
  /departments:
    get:
      tags: [Departments]
      summary: Listar todos los departamentos
      operationId: getDepartments
      responses:
        "200":
          description: Lista de departamentos ordenada por fecha de creación (desc)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Departments]
      summary: Crear un nuevo departamento
      operationId: createDepartment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepartmentInput"
            example:
              nombre: Ingeniería
              jefe: Ana García
              color: "#4f8ef7"
      responses:
        "201":
          description: Departamento creado exitosamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Department"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Ya existe un departamento con ese nombre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: El departamento ya existe
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Employees ─────────────────────────────────────────────────────────────
  /employees:
    get:
      tags: [Employees]
      summary: Listar todos los empleados
      operationId: getEmployees
      responses:
        "200":
          description: Lista de empleados con departamento populado, ordenada por fecha de creación (desc)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Employees]
      summary: Crear un nuevo empleado
      operationId: createEmployee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmployeeInput"
            example:
              nombre: Carlos
              apellido: Pérez
              email: carlos.perez@empresa.com
              departamento: "664f1a2b3c4d5e6f7a8b9c0d"
              cargo: Desarrollador
              telefono: "3001234567"
              salario: 3500000
              fechaIngreso: "2024-01-15"
      responses:
        "201":
          description: Empleado creado exitosamente (con departamento populado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Ya existe un empleado con ese email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: El email ya esta registrado
        "500":
          $ref: "#/components/responses/InternalError"

  /employees/{id}/status:
    patch:
      tags: [Employees]
      summary: Actualizar el estado de un empleado
      operationId: updateEmployeeStatus
      parameters:
        - $ref: "#/components/parameters/MongoId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [estado]
              properties:
                estado:
                  type: string
                  enum: [activo, inactivo]
                  description: Nuevo estado del empleado
            example:
              estado: inactivo
      responses:
        "200":
          description: Estado actualizado exitosamente (con departamento populado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
        "400":
          description: Estado inválido o ID con formato incorrecto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: estado invalido
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Attendance ────────────────────────────────────────────────────────────
  /attendance:
    get:
      tags: [Attendance]
      summary: Listar registros de asistencia
      operationId: getAttendance
      parameters:
        - name: empleado
          in: query
          description: ID del empleado para filtrar (ObjectId de MongoDB)
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
          example: "664f1a2b3c4d5e6f7a8b9c0d"
        - name: month
          in: query
          description: Mes (1-12). Requiere que también se envíe `year`.
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 6
        - name: year
          in: query
          description: Año (4 dígitos). Requiere que también se envíe `month`.
          schema:
            type: integer
            minimum: 2000
          example: 2024
        - name: from
          in: query
          description: Fecha de inicio del rango (ISO 8601). Se ignora si se usan `month`+`year`.
          schema:
            type: string
            format: date
          example: "2024-06-01"
        - name: to
          in: query
          description: Fecha de fin del rango (ISO 8601). Se ignora si se usan `month`+`year`.
          schema:
            type: string
            format: date
          example: "2024-06-30"
      responses:
        "200":
          description: Lista de registros de asistencia con empleado populado, ordenada por fecha (desc)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Attendance"
        "500":
          $ref: "#/components/responses/InternalError"

    post:
      tags: [Attendance]
      summary: Registrar una asistencia
      operationId: createAttendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
            example:
              empleado: "664f1a2b3c4d5e6f7a8b9c0d"
              fecha: "2024-06-10"
              entrada: "08:05"
              salida: "17:00"
              estado: presente
      responses:
        "201":
          description: Registro de asistencia creado exitosamente (con empleado populado)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attendance"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /attendance/summary:
    get:
      tags: [Attendance]
      summary: Resumen de asistencia por estado en un mes
      operationId: getAttendanceSummary
      parameters:
        - name: month
          in: query
          required: true
          description: Mes (1-12)
          schema:
            type: integer
            minimum: 1
            maximum: 12
          example: 6
        - name: year
          in: query
          required: true
          description: Año (4 dígitos)
          schema:
            type: integer
            minimum: 2000
          example: 2024
        - name: empleado
          in: query
          description: ID del empleado para filtrar el resumen (ObjectId de MongoDB)
          schema:
            type: string
            pattern: "^[a-fA-F0-9]{24}$"
          example: "664f1a2b3c4d5e6f7a8b9c0d"
      responses:
        "200":
          description: Conteo de días por estado para el mes solicitado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSummary"
              example:
                presente: 18
                tardio: 2
                ausente: 1
                total: 21
        "400":
          description: Faltan los parámetros `month` o `year`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: month y year son obligatorios
        "500":
          $ref: "#/components/responses/InternalError"

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:

  # ── Parameters ──────────────────────────────────────────────────────────
  parameters:
    MongoId:
      name: id
      in: path
      required: true
      description: Identificador único del recurso (ObjectId de MongoDB, 24 hex chars)
      schema:
        type: string
        pattern: "^[a-fA-F0-9]{24}$"
      example: "664f1a2b3c4d5e6f7a8b9c0d"

  # ── Reusable responses ───────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Datos de entrada inválidos o campos requeridos faltantes
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: El campo "nombre" es obligatorio y no puede estar vacío

    NotFound:
      description: El recurso solicitado no existe
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Empleado no encontrado

    InternalError:
      description: Error interno del servidor
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            message: Error interno del servidor

  # ── Schemas ──────────────────────────────────────────────────────────────
  schemas:

    # ── Shared ──────────────────────────────────────────────────────────────
    MongoId:
      type: string
      pattern: "^[a-fA-F0-9]{24}$"
      description: ObjectId de MongoDB (24 caracteres hexadecimales)
      example: "664f1a2b3c4d5e6f7a8b9c0d"

    Timestamps:
      type: object
      readOnly: true
      properties:
        createdAt:
          type: string
          format: date-time
          description: Fecha de creación del documento
        updatedAt:
          type: string
          format: date-time
          description: Fecha de última actualización

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Descripción legible del error
      required: [message]

    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        message:
          type: string
          example: Backend RRHH activo

    # ── Department ───────────────────────────────────────────────────────────
    DepartmentInput:
      type: object
      required: [nombre]
      properties:
        nombre:
          type: string
          description: Nombre único del departamento
          example: Ingeniería
        jefe:
          type: string
          description: Nombre del jefe del departamento
          default: ""
          example: Ana García
        color:
          type: string
          description: Color representativo en formato hex
          default: "#4f8ef7"
          example: "#4f8ef7"

    Department:
      allOf:
        - type: object
          required: [_id]
          properties:
            _id:
              $ref: "#/components/schemas/MongoId"
            frontendId:
              type: integer
              nullable: true
              description: ID numérico opcional proveniente del frontend
              example: 3
        - $ref: "#/components/schemas/DepartmentInput"
        - $ref: "#/components/schemas/Timestamps"

    # ── Employee ─────────────────────────────────────────────────────────────
    EmployeeInput:
      type: object
      required: [nombre, apellido, email, departamento]
      properties:
        nombre:
          type: string
          description: Nombre del empleado
          example: Carlos
        apellido:
          type: string
          description: Apellido del empleado
          example: Pérez
        email:
          type: string
          format: email
          description: Email único del empleado
          example: carlos.perez@empresa.com
        telefono:
          type: string
          default: ""
          example: "3001234567"
        cargo:
          type: string
          default: ""
          example: Desarrollador Senior
        salario:
          type: number
          minimum: 0
          default: 0
          example: 3500000
        estado:
          type: string
          enum: [activo, inactivo]
          default: activo
        fechaIngreso:
          type: string
          format: date
          description: Fecha de ingreso a la empresa (ISO 8601)
          example: "2024-01-15"
        departamento:
          description: ID del departamento al que pertenece el empleado (ObjectId)
          $ref: "#/components/schemas/MongoId"

    Employee:
      allOf:
        - type: object
          required: [_id]
          properties:
            _id:
              $ref: "#/components/schemas/MongoId"
            frontendId:
              type: integer
              nullable: true
              description: ID numérico opcional proveniente del frontend
              example: 12
        - $ref: "#/components/schemas/EmployeeInput"
        - type: object
          properties:
            departamento:
              description: Departamento populado (en respuestas GET/POST/PATCH)
              oneOf:
                - $ref: "#/components/schemas/MongoId"
                - type: object
                  description: Objeto populado con nombre y color
                  properties:
                    _id:
                      $ref: "#/components/schemas/MongoId"
                    nombre:
                      type: string
                      example: Ingeniería
                    color:
                      type: string
                      example: "#4f8ef7"
        - $ref: "#/components/schemas/Timestamps"

    # ── Attendance ───────────────────────────────────────────────────────────
    AttendanceInput:
      type: object
      required: [empleado, fecha]
      properties:
        empleado:
          description: ID del empleado (ObjectId)
          $ref: "#/components/schemas/MongoId"
        fecha:
          type: string
          format: date
          description: Fecha del registro (ISO 8601)
          example: "2024-06-10"
        entrada:
          type: string
          description: Hora de entrada (HH:MM)
          default: ""
          example: "08:05"
        salida:
          type: string
          description: Hora de salida (HH:MM)
          default: ""
          example: "17:00"
        estado:
          type: string
          enum: [presente, tardio, ausente]
          default: presente
          description: Estado del registro de asistencia

    Attendance:
      allOf:
        - type: object
          required: [_id]
          properties:
            _id:
              $ref: "#/components/schemas/MongoId"
        - $ref: "#/components/schemas/AttendanceInput"
        - type: object
          properties:
            empleado:
              description: Empleado populado (en respuestas GET/POST)
              oneOf:
                - $ref: "#/components/schemas/MongoId"
                - type: object
                  description: Objeto populado con nombre, apellido y email
                  properties:
                    _id:
                      $ref: "#/components/schemas/MongoId"
                    nombre:
                      type: string
                      example: Carlos
                    apellido:
                      type: string
                      example: Pérez
                    email:
                      type: string
                      format: email
                      example: carlos.perez@empresa.com
        - $ref: "#/components/schemas/Timestamps"

    AttendanceSummary:
      type: object
      description: Conteo de registros de asistencia agrupados por estado
      required: [presente, tardio, ausente, total]
      properties:
        presente:
          type: integer
          minimum: 0
          example: 18
        tardio:
          type: integer
          minimum: 0
          example: 2
        ausente:
          type: integer
          minimum: 0
          example: 1
        total:
          type: integer
          minimum: 0
          description: Suma de presente + tardio + ausente
          example: 21
